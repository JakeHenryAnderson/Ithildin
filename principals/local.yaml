principals:
  - id: admin:local-ui
    type: admin
    display_name: Local Review Console Admin
    roles:
      - Admin
      - Approver
      - Auditor
    enabled: true
    metadata:
      source: local-seed

  - id: agent:mcp-local
    type: agent
    display_name: Local MCP Agent
    roles:
      - AgentDeveloper
    enabled: true
    metadata:
      source: local-seed

  - id: agent:local-dev
    type: agent
    display_name: Local Development Agent
    roles:
      - AgentDeveloper
    enabled: true
    metadata:
      source: local-seed

  - id: agent:test
    type: agent
    display_name: Test Agent
    roles:
      - AgentDeveloper
    enabled: true
    metadata:
      source: local-seed

  - id: agent:readonly
    type: agent
    display_name: Read-only Local Agent
    roles:
      - AgentReadOnly
    enabled: true
    metadata:
      source: local-seed

  - id: user:auditor
    type: user
    display_name: Local Auditor
    roles:
      - Auditor
    enabled: true
    metadata:
      source: local-seed

  - id: model:ollama-local
    type: model
    display_name: Local Ollama Model
    roles:
      - AgentReadOnly
    enabled: true
    metadata:
      source: local-model-demo
      managed_by: host-ollama
