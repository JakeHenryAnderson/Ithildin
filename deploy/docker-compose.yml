name: ithildin-demo

services:
  ithildin-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    user: "${ITHILDIN_CONTAINER_UID:-10001}:${ITHILDIN_CONTAINER_GID:-10001}"
    environment:
      ITHILDIN_ADMIN_TOKEN: "${ITHILDIN_ADMIN_TOKEN:?ITHILDIN_ADMIN_TOKEN is required}"
      ITHILDIN_DB_PATH: /app/var/db/ithildin.sqlite3
      ITHILDIN_AUDIT_LOG_PATH: /app/var/logs/audit.jsonl
      ITHILDIN_MANIFEST_DIR: /app/tool-manifests
      ITHILDIN_POLICY_PATH: /app/policies/default.yaml
      ITHILDIN_WORKSPACE_ROOT: /app/workspaces
      ITHILDIN_LOG_LEVEL: "${ITHILDIN_LOG_LEVEL:-INFO}"
      ITHILDIN_MAX_READ_BYTES: "${ITHILDIN_MAX_READ_BYTES:-131072}"
      ITHILDIN_MAX_PATCH_BYTES: "${ITHILDIN_MAX_PATCH_BYTES:-131072}"
      ITHILDIN_HTTP_ALLOWLIST: "${ITHILDIN_HTTP_ALLOWLIST:-}"
      ITHILDIN_HTTP_TIMEOUT_SECONDS: "${ITHILDIN_HTTP_TIMEOUT_SECONDS:-10}"
      ITHILDIN_HTTP_MAX_RESPONSE_BYTES: "${ITHILDIN_HTTP_MAX_RESPONSE_BYTES:-131072}"
      ITHILDIN_HTTP_MAX_REDIRECTS: "${ITHILDIN_HTTP_MAX_REDIRECTS:-3}"
      ITHILDIN_SEARCH_RESULT_LIMIT: "${ITHILDIN_SEARCH_RESULT_LIMIT:-100}"
      ITHILDIN_GIT_LOG_LIMIT: "${ITHILDIN_GIT_LOG_LIMIT:-20}"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ../tool-manifests:/app/tool-manifests:ro
      - ../policies:/app/policies:ro
      - ../workspaces:/app/workspaces
      - ../var:/app/var
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2).read()",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  ithildin-ui:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.ui
      args:
        VITE_ITHILDIN_API_BASE_URL: "${VITE_ITHILDIN_API_BASE_URL:-http://127.0.0.1:8000}"
    ports:
      - "127.0.0.1:5173:8080"
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    depends_on:
      ithildin-api:
        condition: service_healthy
