name: ithildin-demo

services:
  ithildin-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    user: "${ITHILDIN_CONTAINER_UID:-10001}:${ITHILDIN_CONTAINER_GID:-10001}"
    environment:
      ITHILDIN_ADMIN_TOKEN: "${ITHILDIN_ADMIN_TOKEN:?ITHILDIN_ADMIN_TOKEN is required}"
      ITHILDIN_ALLOW_DEV_ADMIN_TOKEN: "${ITHILDIN_ALLOW_DEV_ADMIN_TOKEN:-false}"
      ITHILDIN_STORAGE_BACKEND: "${ITHILDIN_STORAGE_BACKEND:-sqlite}"
      ITHILDIN_POSTGRES_DSN: "${ITHILDIN_POSTGRES_DSN:-}"
      ITHILDIN_DB_PATH: /app/var/db/ithildin.sqlite3
      ITHILDIN_AUDIT_LOG_PATH: /app/var/logs/audit.jsonl
      ITHILDIN_MANIFEST_DIR: /app/tool-manifests
      ITHILDIN_MANIFEST_LOCK_PATH: /app/tool-manifests.lock.json
      ITHILDIN_REQUIRE_MANIFEST_LOCK: "${ITHILDIN_REQUIRE_MANIFEST_LOCK:-true}"
      ITHILDIN_POLICY_PATH: /app/policies/default.yaml
      ITHILDIN_POLICY_ENGINE: "${ITHILDIN_POLICY_ENGINE:-yaml}"
      ITHILDIN_OPA_URL: "${ITHILDIN_OPA_URL:-}"
      ITHILDIN_OPA_DECISION_PATH: "${ITHILDIN_OPA_DECISION_PATH:-/v1/data/ithildin/decision}"
      ITHILDIN_OPA_BUNDLE_MANIFEST_PATH: /app/policies/opa/bundle.lock.json
      ITHILDIN_PRINCIPAL_REGISTRY_PATH: /app/principals/local.yaml
      ITHILDIN_WORKSPACE_ROOT: /app/workspaces
      ITHILDIN_WORKSPACE_REGISTRY_PATH: /app/workspaces/local.yaml
      ITHILDIN_TRUSTED_HOST_REGISTRY_PATH: /app/trusted-hosts/local.yaml
      ITHILDIN_RUNTIME_CANDIDATE_AUTHORIZATION_PATH: /run/ithildin-authority/api-candidate.json
      ITHILDIN_LOG_LEVEL: "${ITHILDIN_LOG_LEVEL:-INFO}"
      ITHILDIN_MAX_READ_BYTES: "${ITHILDIN_MAX_READ_BYTES:-131072}"
      ITHILDIN_MAX_PATCH_BYTES: "${ITHILDIN_MAX_PATCH_BYTES:-131072}"
      ITHILDIN_HTTP_ALLOWLIST: "${ITHILDIN_HTTP_ALLOWLIST:-}"
      ITHILDIN_HTTP_TIMEOUT_SECONDS: "${ITHILDIN_HTTP_TIMEOUT_SECONDS:-10}"
      ITHILDIN_HTTP_MAX_RESPONSE_BYTES: "${ITHILDIN_HTTP_MAX_RESPONSE_BYTES:-131072}"
      ITHILDIN_HTTP_MAX_REDIRECTS: "${ITHILDIN_HTTP_MAX_REDIRECTS:-3}"
      ITHILDIN_REDACTION_EXTRA_KEYS: "${ITHILDIN_REDACTION_EXTRA_KEYS:-}"
      ITHILDIN_REDACTION_EXTRA_PATTERNS: "${ITHILDIN_REDACTION_EXTRA_PATTERNS:-}"
      ITHILDIN_SEARCH_RESULT_LIMIT: "${ITHILDIN_SEARCH_RESULT_LIMIT:-100}"
      ITHILDIN_GIT_LOG_LIMIT: "${ITHILDIN_GIT_LOG_LIMIT:-20}"
      ITHILDIN_OTEL_ENABLED: "${ITHILDIN_OTEL_ENABLED:-false}"
      ITHILDIN_OTEL_SERVICE_NAME: "${ITHILDIN_OTEL_SERVICE_NAME:-ithildin-api}"
      ITHILDIN_OTEL_CONSOLE_EXPORT: "${ITHILDIN_OTEL_CONSOLE_EXPORT:-false}"
      ITHILDIN_OTEL_OTLP_ENDPOINT: "${ITHILDIN_OTEL_OTLP_ENDPOINT:-}"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ../tool-manifests.lock.json:/app/tool-manifests.lock.json:ro
      - ../tool-manifests:/app/tool-manifests:ro
      - ../policies:/app/policies:ro
      - ../principals:/app/principals:ro
      - ../trusted-hosts:/app/trusted-hosts:ro
      - ../runtime-authority/api-candidate.json:/run/ithildin-authority/api-candidate.json:ro
      - ../scripts:/app/scripts:ro
      - ../workspaces:/app/workspaces
      - ../var:/app/var
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2).read()",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  ithildin-ui:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.ui
      args:
        VITE_ITHILDIN_API_BASE_URL: "${VITE_ITHILDIN_API_BASE_URL:-http://127.0.0.1:8000}"
    ports:
      - "127.0.0.1:5173:8080"
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    depends_on:
      ithildin-api:
        condition: service_healthy

  ithildin-node:
    profiles:
      - node
    build:
      context: ..
      dockerfile: deploy/Dockerfile.node
    image: ithildin/node:local
    user: "10002:10002"
    command:
      - run
      - --state
      - /var/lib/ithildin-node/state.json
      - --configuration
      - /var/lib/ithildin-node/configuration.json
      - --node-version
      - "${ITHILDIN_NODE_VERSION:-0.1.0}"
      - --runner-adapter
      - "${ITHILDIN_NODE_RUNNER_ADAPTER:-hermes}"
      - --deployment-topology
      - docker_sidecar
    volumes:
      - ithildin-node-state:/var/lib/ithildin-node
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 64
    init: true
    depends_on:
      ithildin-api:
        condition: service_healthy

volumes:
  ithildin-node-state:
