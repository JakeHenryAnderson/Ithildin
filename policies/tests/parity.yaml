version: policy-parity-v1
cases:
  - id: read_preview_matches_runtime
    description: In-scope read preview and runtime policy evidence agree.
    tool_name: fs.list
    arguments:
      path: "."
    principal:
      id: agent:mcp-local
      roles:
        - Owner
    session_id: parity-read
    expect_decision: allow
    expect_runtime_status: completed
    expect_resource_type: file
    expect_resource_in_scope: true

  - id: write_preview_matches_runtime
    description: Write preview and runtime policy evidence agree on approval requirement.
    tool_name: fs.patch.apply
    arguments:
      proposal_id: patch_abc
    principal:
      id: agent:mcp-local
    session_id: parity-write
    expect_decision: require_approval
    expect_runtime_status: approval_required

  - id: proposal_preview_matches_runtime
    description: Patch proposal preview and runtime policy evidence agree.
    tool_name: fs.patch.propose
    arguments:
      path: README.md
      unified_diff: |
        --- a/README.md
        +++ b/README.md
        @@ -1 +1 @@
        -Ithildin
        +Ithildin
    principal:
      id: agent:mcp-local
    session_id: parity-proposal
    expect_decision: allow
    expect_resource_type: file
    expect_resource_in_scope: true

  - id: out_of_scope_filesystem_preview_matches_runtime
    description: Traversal read preview and runtime policy evidence agree on deny before execution.
    tool_name: fs.read
    arguments:
      path: ../README.md
    principal:
      id: agent:mcp-local
    session_id: parity-filesystem-deny
    expect_decision: deny
    expect_runtime_status: denied
    expect_resource_type: file
    expect_resource_in_scope: false
    expect_policy_evidence: false

  - id: network_preview_matches_runtime
    description: Allowlisted network preview and runtime policy evidence agree.
    tool_name: http.fetch
    arguments:
      url: https://example.com/data
    principal:
      id: agent:mcp-local
    session_id: parity-network
    expect_decision: allow

  - id: out_of_scope_network_preview_matches_runtime
    description: Unallowlisted network preview and runtime policy evidence agree on deny.
    tool_name: http.fetch
    arguments:
      url: https://blocked.example/data
    principal:
      id: agent:mcp-local
    session_id: parity-network-deny
    expect_decision: deny
    expect_policy_evidence: false

  - id: invalid_arguments_preview_matches_runtime
    description: Schema-invalid tool arguments are denied before policy evidence is produced.
    tool_name: fs.read
    arguments: {}
    principal:
      id: agent:mcp-local
    session_id: parity-invalid-arguments
    expect_decision: deny
    expect_valid_arguments: false
    expect_runtime_status: denied
    expect_policy_evidence: false

  - id: invalid_http_arguments_preview_matches_runtime
    description: Schema-invalid HTTP arguments do not construct a network resource before denial.
    tool_name: http.fetch
    arguments:
      url: https://example.com/data
      headers:
        authorization: Bearer secret-value
    principal:
      id: agent:mcp-local
    session_id: parity-invalid-http-arguments
    expect_decision: deny
    expect_valid_arguments: false
    expect_runtime_status: denied
    expect_resource_type: tool_call
    expect_resource_in_scope: false
    expect_policy_evidence: false

  - id: readonly_network_visibility_matches_runtime
    description: Read-only principals are denied for network tools before policy evidence is produced.
    tool_name: http.fetch
    arguments:
      url: https://example.com/data
    principal:
      id: agent:readonly
    session_id: parity-readonly-network
    expect_decision: deny
    expect_valid_arguments: false
    expect_runtime_status: denied
    expect_policy_evidence: false

  - id: empty_principal_preview_matches_runtime
    description: An explicit empty principal is denied instead of defaulting to admin.
    tool_name: fs.read
    arguments:
      path: README.md
    principal: {}
    session_id: parity-empty-principal
    expect_decision: deny
    expect_valid_arguments: false
    expect_runtime_status: denied
    expect_policy_evidence: false
