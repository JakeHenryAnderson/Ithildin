version: policy-parity-v1
cases:
  - id: read_preview_matches_runtime
    description: In-scope read preview and runtime policy evidence agree.
    tool_name: fs.list
    arguments:
      path: "."
    principal:
      id: agent:mcp-local
      roles:
        - Owner
    session_id: parity-read
    expect_decision: allow
    expect_runtime_status: completed
    expect_resource_type: file
    expect_resource_in_scope: true

  - id: write_preview_matches_runtime
    description: Write preview and runtime policy evidence agree on approval requirement.
    tool_name: fs.patch.apply
    arguments:
      proposal_id: patch_abc
    principal:
      id: agent:mcp-local
    session_id: parity-write
    expect_decision: require_approval
    expect_runtime_status: approval_required

  - id: proposal_preview_matches_runtime
    description: Patch proposal preview and runtime policy evidence agree.
    tool_name: fs.patch.propose
    arguments:
      path: README.md
      unified_diff: |
        --- a/README.md
        +++ b/README.md
        @@ -1 +1 @@
        -Ithildin
        +Ithildin
    principal:
      id: agent:mcp-local
    session_id: parity-proposal
    expect_decision: allow
    expect_resource_type: file
    expect_resource_in_scope: true

  - id: out_of_scope_filesystem_preview_matches_runtime
    description: Traversal read preview and runtime policy evidence agree on deny before execution.
    tool_name: fs.read
    arguments:
      path: ../README.md
    principal:
      id: agent:mcp-local
    session_id: parity-filesystem-deny
    expect_decision: deny
    expect_runtime_status: denied
    expect_resource_type: file
    expect_resource_in_scope: false
    expect_policy_evidence: false

  - id: network_preview_matches_runtime
    description: Allowlisted network preview and runtime policy evidence agree.
    tool_name: http.fetch
    arguments:
      url: https://example.com/data
    principal:
      id: agent:mcp-local
    session_id: parity-network
    expect_decision: allow

  - id: git_commit_metadata_preview_matches_runtime
    description: Commit metadata preview and runtime policy evidence agree on a scoped Git commit resource.
    tool_name: git.show.commit_metadata
    arguments:
      ref:
        kind: object_id
        value: POLICY_PARITY_COMMIT
    principal:
      id: agent:mcp-local
    session_id: parity-git-commit-metadata
    expect_decision: allow
    expect_runtime_status: completed
    expect_resource_type: git_commit
    expect_resource_in_scope: true

  - id: git_ref_summary_preview_matches_runtime
    description: Ref summary preview and runtime policy evidence agree on a scoped Git refs resource.
    tool_name: git.show.ref_summary
    arguments:
      selector:
        kind: all_local
      limit: 5
    principal:
      id: agent:mcp-local
    session_id: parity-git-ref-summary
    expect_decision: allow
    expect_runtime_status: completed
    expect_resource_type: git_refs
    expect_resource_in_scope: true

  - id: git_tag_metadata_preview_matches_runtime
    description: Tag metadata preview and runtime policy evidence agree on a scoped Git tags resource.
    tool_name: git.show.tag_metadata
    arguments:
      selector:
        kind: all_local_tags
      limit: 5
    principal:
      id: agent:mcp-local
    session_id: parity-git-tag-metadata
    expect_decision: allow
    expect_runtime_status: completed
    expect_resource_type: git_tags
    expect_resource_in_scope: true
    expect_resource_fields:
      selector_kind: all_local_tags

  - id: project_manifest_summary_preview_matches_runtime
    description: Project manifest summary preview and runtime policy evidence agree on a scoped project manifest resource.
    tool_name: project.manifest.summary
    arguments:
      root: "."
      manifest_kinds:
        - package.json
      limit: 5
    principal:
      id: agent:mcp-local
    session_id: parity-project-manifest-summary
    expect_decision: allow
    expect_runtime_status: completed
    expect_resource_type: project_manifest
    expect_resource_in_scope: true

  - id: project_dependency_summary_preview_matches_runtime
    description: Project dependency summary preview and runtime policy evidence agree on a scoped project dependencies resource.
    tool_name: project.dependency.summary
    arguments:
      root: "."
      manifest_kinds:
        - package.json
      limit: 5
    principal:
      id: agent:mcp-local
    session_id: parity-project-dependency-summary
    expect_decision: allow
    expect_runtime_status: completed
    expect_resource_type: project_dependencies
    expect_resource_in_scope: true

  - id: project_structure_summary_preview_matches_runtime
    description: Project structure summary preview and runtime policy evidence agree on a scoped project structure resource.
    tool_name: project.structure.summary
    arguments:
      root: "."
      max_depth: 2
      limit: 25
    principal:
      id: agent:mcp-local
    session_id: parity-project-structure-summary
    expect_decision: allow
    expect_runtime_status: completed
    expect_resource_type: project_structure
    expect_resource_in_scope: true

  - id: project_test_summary_preview_matches_runtime
    description: Project test summary preview and runtime policy evidence agree on a scoped project tests resource.
    tool_name: project.test.summary
    arguments:
      root: "."
      max_depth: 3
      limit: 30
    principal:
      id: agent:mcp-local
    session_id: parity-project-test-summary
    expect_decision: allow
    expect_runtime_status: completed
    expect_resource_type: project_tests
    expect_resource_in_scope: true

  - id: project_docs_summary_preview_matches_runtime
    description: Project docs summary preview and runtime policy evidence agree on a scoped project docs resource.
    tool_name: project.docs.summary
    arguments:
      root: "."
      max_depth: 3
      limit: 30
    principal:
      id: agent:mcp-local
    session_id: parity-project-docs-summary
    expect_decision: allow
    expect_runtime_status: completed
    expect_resource_type: project_docs
    expect_resource_in_scope: true

  - id: project_language_summary_preview_matches_runtime
    description: Project language summary preview and runtime policy evidence agree on a scoped project language resource.
    tool_name: project.language.summary
    arguments:
      root: "."
      max_depth: 3
      limit: 30
    principal:
      id: agent:mcp-local
    session_id: parity-project-language-summary
    expect_decision: allow
    expect_runtime_status: completed
    expect_resource_type: project_language
    expect_resource_in_scope: true

  - id: project_config_summary_preview_matches_runtime
    description: Project config summary preview and runtime policy evidence agree on a scoped project config resource.
    tool_name: project.config.summary
    arguments:
      root: "."
      max_depth: 3
      limit: 30
    principal:
      id: agent:mcp-local
    session_id: parity-project-config-summary
    expect_decision: allow
    expect_runtime_status: completed
    expect_resource_type: project_config
    expect_resource_in_scope: true

  - id: project_ci_summary_preview_matches_runtime
    description: Project CI summary preview and runtime policy evidence agree on a scoped project CI resource.
    tool_name: project.ci.summary
    arguments:
      root: "."
      max_depth: 4
      limit: 30
    principal:
      id: agent:mcp-local
    session_id: parity-project-ci-summary
    expect_decision: allow
    expect_runtime_status: completed
    expect_resource_type: project_ci
    expect_resource_in_scope: true

  - id: project_release_summary_preview_matches_runtime
    description: Project release summary preview and runtime policy evidence agree on a scoped project release resource.
    tool_name: project.release.summary
    arguments:
      root: "."
      max_depth: 4
      limit: 30
    principal:
      id: agent:mcp-local
    session_id: parity-project-release-summary
    expect_decision: allow
    expect_runtime_status: completed
    expect_resource_type: project_release
    expect_resource_in_scope: true

  - id: out_of_scope_network_preview_matches_runtime
    description: Unallowlisted network preview and runtime policy evidence agree on deny.
    tool_name: http.fetch
    arguments:
      url: https://blocked.example/data
    principal:
      id: agent:mcp-local
    session_id: parity-network-deny
    expect_decision: deny
    expect_policy_evidence: false

  - id: invalid_arguments_preview_matches_runtime
    description: Schema-invalid tool arguments are denied before policy evidence is produced.
    tool_name: fs.read
    arguments: {}
    principal:
      id: agent:mcp-local
    session_id: parity-invalid-arguments
    expect_decision: deny
    expect_valid_arguments: false
    expect_runtime_status: denied
    expect_policy_evidence: false

  - id: invalid_http_arguments_preview_matches_runtime
    description: Schema-invalid HTTP arguments do not construct a network resource before denial.
    tool_name: http.fetch
    arguments:
      url: https://example.com/data
      headers:
        authorization: Bearer secret-value
    principal:
      id: agent:mcp-local
    session_id: parity-invalid-http-arguments
    expect_decision: deny
    expect_valid_arguments: false
    expect_runtime_status: denied
    expect_resource_type: tool_call
    expect_resource_in_scope: false
    expect_policy_evidence: false

  - id: readonly_network_visibility_matches_runtime
    description: Read-only principals are denied for network tools before policy evidence is produced.
    tool_name: http.fetch
    arguments:
      url: https://example.com/data
    principal:
      id: agent:readonly
    session_id: parity-readonly-network
    expect_decision: deny
    expect_valid_arguments: false
    expect_runtime_status: denied
    expect_policy_evidence: false

  - id: empty_principal_preview_matches_runtime
    description: An explicit empty principal is denied instead of defaulting to admin.
    tool_name: fs.read
    arguments:
      path: README.md
    principal: {}
    session_id: parity-empty-principal
    expect_decision: deny
    expect_valid_arguments: false
    expect_runtime_status: denied
    expect_policy_evidence: false
