name: project.dependency.summary
version: 0.1.0
title: Summarize direct dependency counts
risk: read
category: project
mcp:
  exposed: true
  annotations:
    readOnlyHint: true
input_schema:
  type: object
  additionalProperties: false
  properties:
    workspace_id:
      type: string
      default: default
    root:
      type: string
      default: "."
      minLength: 1
      maxLength: 240
    manifest_kinds:
      type: array
      minItems: 1
      maxItems: 9
      uniqueItems: true
      items:
        type: string
        enum:
          - package.json
          - pyproject.toml
          - go.mod
          - Cargo.toml
          - pom.xml
          - build.gradle
          - requirements.txt
          - Gemfile
          - composer.json
    limit:
      type: integer
      minimum: 1
      maximum: 20
      default: 20
