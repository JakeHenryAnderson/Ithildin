name: project.structure.summary
version: 0.1.0
title: Summarize project structure
risk: read
category: project
mcp:
  exposed: true
  annotations:
    readOnlyHint: true
input_schema:
  type: object
  additionalProperties: false
  properties:
    workspace_id:
      type: string
      default: default
    root:
      type: string
      default: "."
      minLength: 1
      maxLength: 240
    max_depth:
      type: integer
      minimum: 0
      maximum: 4
      default: 2
    limit:
      type: integer
      minimum: 1
      maximum: 250
      default: 150
    include_categories:
      type: array
      minItems: 1
      maxItems: 3
      uniqueItems: true
      items:
        type: string
        enum:
          - directory_categories
          - file_kinds
          - skipped_counts
