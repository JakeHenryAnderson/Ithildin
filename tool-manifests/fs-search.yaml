name: fs.search
version: 0.1.0
title: Search workspace text files
risk: read
category: filesystem
mcp:
  exposed: true
  annotations:
    readOnlyHint: true
input_schema:
  type: object
  additionalProperties: false
  required:
    - query
  properties:
    path:
      type: string
      default: "."
    query:
      type: string
      minLength: 1
    workspace_id:
      type: string
      default: default
