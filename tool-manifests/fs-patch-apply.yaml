name: fs.patch.apply
version: 0.1.0
title: Apply an approved workspace patch
risk: write
category: filesystem
mcp:
  exposed: true
  annotations:
    readOnlyHint: false
input_schema:
  type: object
  additionalProperties: false
  properties:
    proposal_id:
      type: string
      pattern: "^patch_[0-9a-f]+$"
    approval_id:
      type: string
      pattern: "^appr_[0-9a-f]+$"
  oneOf:
    - required:
        - proposal_id
    - required:
        - approval_id
